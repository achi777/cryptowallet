# Default compose flow — single-container, H2 in-memory.
# Mirrors the portal-deploy staging container so `docker compose up` and the
# deployed image behave identically. For a Postgres-backed run, layer
# docker-compose.prod.yml on top: see DEPLOY.md.
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cryptowallet-app
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: staging
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:8080/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
