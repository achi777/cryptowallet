# Default compose flow — single-container, H2 in-memory.
# Mirrors the portal-deploy staging container so `docker compose up` and the
# deployed image behave identically. For a Postgres-backed run, layer
# docker-compose.prod.yml on top: see DEPLOY.md.
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cryptowallet-app
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: staging
      # First-boot admin bootstrap (AdminBootstrapRunner reads these once on a
      # fresh H2 DB; subsequent restarts are a no-op). Mirrored in
      # ~/.openclaw/workspace/projects/CRYPTOWALL/ADMIN_CREDENTIALS.md so the
      # portal dashboard surfaces the same values to the project owner.
      ADMIN_BOOTSTRAP_USERNAME: admin
      ADMIN_BOOTSTRAP_EMAIL: admin@cryptowall.local
      ADMIN_BOOTSTRAP_PASSWORD: ${ADMIN_BOOTSTRAP_PASSWORD:-XPaevIbyZ6klD5ZeZFeGIQ8h}
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:8080/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
