# Staging profile — single-container deploy via portal-deploy.
# H2 in-memory DB so the JAR is self-sufficient without an external Postgres.
# (Project convention is YAML; matches application.yml / application-h2.yml.)
spring:
  application:
    name: crypto-wallet-backend

  datasource:
    url: jdbc:h2:mem:cryptowallet;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: ""

  # Lock down H2 console — staging is internet-reachable, console is not for prod.
  h2:
    console:
      enabled: false

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: false

  # Static SPA routing — Spring serves bundled React build for unknown paths.
  web:
    resources:
      static-locations: classpath:/static/

server:
  port: 8080

# Expose only the liveness/readiness health endpoint — never the full actuator surface.
management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

crypto:
  bitcoin:
    network: test
  tron:
    api-url: https://api.trongrid.io
    private-key: ${TRON_PRIVATE_KEY:}

# First-boot administrator bootstrap (consumed once by AdminBootstrapRunner).
# Defaults match ~/.openclaw/workspace/projects/CRYPTOWALL/ADMIN_CREDENTIALS.md so
# the staging container provisions the documented admin even when the portal-deploy
# daemon launches the JAR without an env file (Spring profile = staging only).
# Production deploys override ADMIN_BOOTSTRAP_PASSWORD via env to a strong secret.
admin:
  bootstrap:
    username: ${ADMIN_BOOTSTRAP_USERNAME:admin}
    email: ${ADMIN_BOOTSTRAP_EMAIL:admin@cryptowall.local}
    password: ${ADMIN_BOOTSTRAP_PASSWORD:XPaevIbyZ6klD5ZeZFeGIQ8h}

# First-boot seeded customer bootstrap (consumed once by CustomerBootstrapRunner).
# Defaults match ~/.openclaw/workspace/projects/CRYPTOWALL/USER_CREDENTIALS.md so the
# validator's auth-walk-as-customer scenario can sign in on every fresh staging boot.
customer:
  bootstrap:
    username: ${CUSTOMER_BOOTSTRAP_USERNAME:customer}
    email: ${CUSTOMER_BOOTSTRAP_EMAIL:customer@cryptowall.local}
    password: ${CUSTOMER_BOOTSTRAP_PASSWORD:V7vrlUZDh3MK2u99nGaC5Eyk}

# Master KEK — optional in staging (deterministic dev-fallback used with a loud WARN).
app:
  security:
    kek: ${CRYPTOWALL_KEK_BASE64:}

logging:
  level:
    com.cryptowallet: INFO
