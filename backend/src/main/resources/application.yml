spring:
  application:
    name: crypto-wallet-backend
  
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/cryptowallet}
    driver-class-name: org.postgresql.Driver
    username: ${SPRING_DATASOURCE_USERNAME:cryptouser}
    password: ${SPRING_DATASOURCE_PASSWORD:}
  
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

server:
  port: 8080

crypto:
  bitcoin:
    network: test
  tron:
    api-url: https://api.trongrid.io
    private-key: ${TRON_PRIVATE_KEY:}

# Master key-encryption-key (KEK) for at-rest encryption — base64 of 32 raw bytes.
# Real value MUST come from CRYPTOWALL_KEK_BASE64 (env). See architecture/SECURITY.md.
app:
  security:
    kek: ${CRYPTOWALL_KEK_BASE64:}
  
logging:
  level:
    com.cryptowallet: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE